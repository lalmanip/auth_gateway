name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  IMAGE_NAME: vivance/auth-gateway

jobs:

  # ──────────────────────────────────────────────
  # Job 1: Build & Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (tests skipped — no DB in CI)
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: Docker Build & Push
  # ──────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      secondary-tag: ${{ steps.tags.outputs.secondary }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "primary=latest" >> $GITHUB_OUTPUT
            echo "secondary=release-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "primary=develop" >> $GITHUB_OUTPUT
            echo "secondary=develop-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.primary }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.secondary }}

  # ──────────────────────────────────────────────
  # Job 3: Deploy to DEV (ONLY develop branch)
  # ──────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG=${{ needs.docker-build-push.outputs.secondary-tag }}

            echo "==> Updating Kubernetes deployment..."
            kubectl set image deployment/vivance-auth-api \
              vivance-auth-api=vivance/auth-gateway:$IMAGE_TAG

            kubectl annotate deployment vivance-auth-api \
              kubernetes.io/change-cause="DEV deploy $IMAGE_TAG" \
              --overwrite

            echo "==> Waiting for rollout..."
            kubectl rollout status deployment/vivance-auth-api --timeout=120s

            echo "==> Deployment complete!"
            kubectl get pods -l app=vivance-auth-api
