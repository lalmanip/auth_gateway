spring.application.name=vivance-auth-service
server.port=8084
server.servlet.context-path=/vivapi-auth
spring.profiles.active=dev

# Database
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vivance_java}
spring.datasource.username=${DB_USERNAME:java_user}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
auth.jwt.secret=${JWT_SECRET:VivanceAuthServiceSecretKey2024VivanceAuthServiceSecretKey2024VivanceAuth}
auth.jwt.access-token-expiry-ms=${JWT_ACCESS_EXPIRY_MS:3600000}
auth.jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:30}

# Google OAuth2 — comma-separated list (web client ID + android client ID + ios client ID)
auth.google.client-ids=${GOOGLE_CLIENT_IDS:}

# Apple Sign-In
auth.apple.client-id=${APPLE_CLIENT_ID:}
auth.apple.keys-url=https://appleid.apple.com/auth/keys
auth.apple.issuer=https://appleid.apple.com

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Vivance API (backend) — used to fetch a backend session token on user login
vivance.api.base-url=${VIVANCE_API_BASE_URL:http://localhost:8080}
vivance.api.domain-key=${VIVANCE_API_DOMAIN_KEY:}
vivance.api.username=${VIVANCE_API_USERNAME:}
vivance.api.password=${VIVANCE_API_PASSWORD:}
vivance.api.system=${VIVANCE_API_SYSTEM:}

# Logging
logging.level.com.vivance.auth=DEBUG
